name: regression
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub Pages publishing needs these permissions at the workflow level.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment can be in flight at a time per environment.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  regression-chromium-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Sync dependencies
        run: ~/.local/bin/uv sync
      - name: Install Playwright browsers
        run: ~/.local/bin/uv run playwright install --with-deps chromium
      - name: Run regression suite
        env:
          PROFILE: ci
        run: ~/.local/bin/uv run pytest -m regression -n 4 --alluredir=allure-results
        continue-on-error: true
      - name: Install Allure CLI
        run: |
          curl -o allure-2.30.0.tgz -Ls https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure-2.30.0.tgz
          echo "$PWD/allure-2.30.0/bin" >> $GITHUB_PATH
      - name: Generate Allure HTML report
        run: allure generate allure-results --clean -o allure-report
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14
      - name: Upload Allure HTML report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14
      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/
          retention-days: 14
      - name: Upload Playwright test-results (traces, videos, failure screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

      # ---- GitHub Pages publish ----
      # Only on push to main (PRs from forks cannot deploy Pages).
      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
